# Standard SFT/LoRA config (no quantization, for smaller models or full VRAM availability)

finetune:
  type: sft

model:
  model_path: ./checkpoints/10m_pretrain
  tokenizer_path: null

data:
  train_data_path: null
  eval_data_path: null
  hf_dataset_name: null
  hf_train_split: train
  hf_eval_split: null
  hf_conversation_column: conversation_a
  hf_max_samples: null

training:
  epochs: 3
  batch_size: 8
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 100
  gradient_accumulation_steps: 4
  max_seq_length: 512
  max_grad_norm: 1.0

lora:
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

quantization:
  use_qlora: false

save:
  output_dir: ./checkpoints/finetuned
  save_mode: adapter

runtime:
  use_gradient_checkpointing: true
  mixed_precision: bf16
  log_interval: 10
  eval_interval: 500
  save_interval: 1000
  wandb_project: null
