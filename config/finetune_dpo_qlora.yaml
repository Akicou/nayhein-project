# Low-VRAM DPO config for scaled models (QLoRA mode)
# Uses reference-free DPO by default for VRAM efficiency

finetune:
  type: dpo

model:
  model_path: ./checkpoints/4b_scaled
  tokenizer_path: null

data:
  train_data_path: null
  eval_data_path: null
  hf_dataset_name: null
  hf_train_split: train
  hf_eval_split: null
  hf_conversation_column: conversation_a
  hf_max_samples: null

training:
  epochs: 2
  batch_size: 1
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 50
  gradient_accumulation_steps: 16
  max_seq_length: 1024
  max_grad_norm: 1.0

lora:
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

quantization:
  use_qlora: true
  quantization_bits: 4
  quantization_compute_dtype: bfloat16

save:
  output_dir: ./checkpoints/finetuned_dpo_qlora
  save_mode: adapter

dpo:
  beta: 0.1
  reference_free: true
  loss_type: sigmoid
  reference_model_path: null

runtime:
  use_gradient_checkpointing: true
  mixed_precision: bf16
  log_interval: 10
  eval_interval: 500
  save_interval: 1000
  wandb_project: null
